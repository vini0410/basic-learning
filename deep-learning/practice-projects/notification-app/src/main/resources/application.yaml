app:
  queue:
    name: my-queue

spring:
  application:
    name: notification-app
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        acknowledge-mode: manual        # manual ack = safer, no silent message loss
        prefetch: 10                    # how many unacked msgs per consumer at once
        retry:
          enabled: true
          initial-interval: 1000ms
          multiplier: 2.0
          max-retries: 3

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL_ADDRESS}
    password: ${EMAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

meta:
  whatsapp:
    token: ${WHATSAPP_TOKEN}
    number-id: ${WHATSAPP_NUMBER_ID}

# Facilita a visualização do tráfego do RabbitMQ e da sua aplicação
logging:
  level:
    root: INFO
    com.notification.notificationapp: DEBUG
    org.springframework.amqp: INFO
    org.springframework.mail: INFO